<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--CSS-->
    <link rel="stylesheet" href="style.css">
   
    <!--"Program name: registrationForm.html
        Author: Marco Viana Urrutia
        Date created: Feb/20/2026 
        Date last edited: The date you submitted it
        Version: 3.0
        Description: This is an intake form for new patients-->
     <title>Patient Solutions Clinic</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="top">
            <img src="/Images/Healtcare Logo.png" alt="Clinic Logo" class="logo">
            <div>
                <h1>Patient Intake Form</h1>
                <p>Please complete all required fields.</p>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <form id="patientForm" action="Information has been sent.html" method="get">
                <table>
                    <tr>
                        <th colspan="3">Block 1: Personal Information</th>
                    </tr>

                    <tr>
                        <td>
                            <label for="firstName">First Name</label>
                            <input
                                id="firstName"
                                name="firstName"
                                type="text"
                                maxlength="30"
                                pattern=".{1,30}"
                                title="Enter your first name. It must be between 1 and 30 characters."
                                required>
                            <span class="error" id="firstNameError"></span>
                        </td>

                        <td>
                            <label for="middleInitial">Middle Initial</label>
                            <input
                                id="middleInitial"
                                name="middleInitial"
                                type="text"
                                maxlength="1"
                                pattern="[A-Za-z]?"
                                title="Enter one letter for your middle initial, or leave it blank.">
                            <span class="error" id="middleInitialError"></span>
                        </td>

                        <td>
                            <label for="lastName">Last Name</label>
                            <input
                                id="lastName"
                                name="lastName"
                                type="text"
                                maxlength="30"
                                pattern=".{1,30}"
                                title="Enter your last name. It must be between 1 and 30 characters."
                                required>
                            <span class="error" id="lastNameError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="birthMonth">Birth Month</label>
                            <input
                                id="birthMonth"
                                name="birthMonth"
                                type="text"
                                maxlength="2"
                                pattern="0[1-9]|1[0-2]"
                                placeholder="MM"
                                title="Enter the month using 2 digits, from 01 to 12."
                                required>
                            <span class="error" id="birthMonthError"></span>
                        </td>

                        <td>
                            <label for="birthDay">Birth Day</label>
                            <input
                                id="birthDay"
                                name="birthDay"
                                type="text"
                                maxlength="2"
                                pattern="0[1-9]|[12][0-9]|3[01]"
                                placeholder="DD"
                                title="Enter the day using 2 digits, from 01 to 31."
                                required>
                            <span class="error" id="birthDayError"></span>
                        </td>

                        <td>
                            <label for="birthYear">Birth Year</label>
                            <input
                                id="birthYear"
                                name="birthYear"
                                type="text"
                                maxlength="4"
                                pattern="[0-9]{4}"
                                placeholder="YYYY"
                                title="Enter the year using 4 digits."
                                required>
                            <span class="error" id="birthYearError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="3">
                            <label for="patientId">Patient ID Number</label>
                            <input
                                id="patientId"
                                name="patientId"
                                type="password"
                                pattern="[0-9]{4,12}"
                                title="Enter a patient ID number using 4 to 12 digits."
                                required>
                            <span class="error" id="patientIdError"></span>
                        </td>
                    </tr>

                    <tr>
                        <th colspan="3">Block 2: Contact Information</th>
                    </tr>

                    <tr>
                        <td colspan="2">
                            <label for="email">Email Address</label>
                            <input
                                id="email"
                                name="email"
                                type="email"
                                title="Enter your email address."
                                required>
                            <span class="error" id="emailError"></span>
                        </td>

                        <td>
                            <label for="phone">Phone Number</label>
                            <input
                                id="phone"
                                name="phone"
                                type="tel"
                                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                                placeholder="000-000-0000"
                                title="Enter your phone number in the format 000-000-0000."
                                required>
                            <span class="error" id="phoneError"></span>
                        </td>
                    </tr>

                    <tr>
                        <th colspan="3">Block 3: Address</th>
                    </tr>

                    <tr>
                        <td colspan="3">
                            <label for="addr1">Address Line 1</label>
                            <input
                                id="addr1"
                                name="addr1"
                                type="text"
                                minlength="2"
                                maxlength="30"
                                title="Enter your address line 1. Use 2 to 30 characters."
                                required>
                            <span class="error" id="addr1Error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="3">
                            <label for="addr2">Address Line 2</label>
                            <input
                                id="addr2"
                                name="addr2"
                                type="text"
                                minlength="2"
                                maxlength="30"
                                title="Optional. If entered, use 2 to 30 characters.">
                            <span class="error" id="addr2Error"></span>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="city">City</label>
                            <input
                                id="city"
                                name="city"
                                type="text"
                                minlength="2"
                                maxlength="30"
                                title="Enter your city. Use 2 to 30 characters."
                                required>
                            <span class="error" id="cityError"></span>
                        </td>

          <td>
            <label for="state">State</label>
            <select id="state" name="state" required>
              <option value="">-- Select --</option>
              <option value="AL">Alabama</option>
              <option value="AK">Alaska</option>
              <option value="AZ">Arizona</option>
              <option value="AR">Arkansas</option>
              <option value="CA">California</option>
              <option value="CO">Colorado</option>
              <option value="CT">Connecticut</option>
              <option value="DE">Delaware</option>
              <option value="DC">District of Columbia</option>
              <option value="FL">Florida</option>
              <option value="GA">Georgia</option>
              <option value="HI">Hawaii</option>
              <option value="ID">Idaho</option>
              <option value="IL">Illinois</option>
              <option value="IN">Indiana</option>
              <option value="IA">Iowa</option>
              <option value="KS">Kansas</option>
              <option value="KY">Kentucky</option>
              <option value="LA">Louisiana</option>
              <option value="ME">Maine</option>
              <option value="MD">Maryland</option>
              <option value="MA">Massachusetts</option>
              <option value="MI">Michigan</option>
              <option value="MN">Minnesota</option>
              <option value="MS">Mississippi</option>
              <option value="MO">Missouri</option>
              <option value="MT">Montana</option>
              <option value="NE">Nebraska</option>
              <option value="NV">Nevada</option>
              <option value="NH">New Hampshire</option>
              <option value="NJ">New Jersey</option>
              <option value="NM">New Mexico</option>
              <option value="NY">New York</option>
              <option value="NC">North Carolina</option>
              <option value="ND">North Dakota</option>
              <option value="OH">Ohio</option>
              <option value="OK">Oklahoma</option>
              <option value="OR">Oregon</option>
              <option value="PA">Pennsylvania</option>
              <option value="RI">Rhode Island</option>
              <option value="SC">South Carolina</option>
              <option value="SD">South Dakota</option>
              <option value="TN">Tennessee</option>
              <option value="TX">Texas</option>
              <option value="UT">Utah</option>
              <option value="VT">Vermont</option>
              <option value="VA">Virginia</option>
              <option value="WA">Washington</option>
              <option value="WV">West Virginia</option>
              <option value="WI">Wisconsin</option>
              <option value="WY">Wyoming</option>
              <option value="PR">Puerto Rico</option>
            </select>
          </td>

          <td>
            <label for="zip">Zip Code</label>
            <input
              id="zip"
              name="zip"
              type="text"
              minlength="5"
              maxlength="10"/>
          </td>
        </tr>

        <tr>
          <td colspan="3">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" placeholder="yourname@yahoo.com" required />
          </td>
        </tr>

        <tr>
          <td colspan="3">
            <label for="symptoms">Describe your current symptoms</label>
            <textarea id="symptoms" name="symptoms" rows="3" cols="50" placeholder="Describe symptoms here..." required></textarea>
          </td>
        </tr>

        <tr>
          <td colspan="3">
            <fieldset>
              <legend>Select all that apply</legend>

              <div class="inline-group">
                <div>
                  <label><input type="checkbox" name="history" value="asthma" /> Asthma</label><br />
                  <label><input type="checkbox" name="history" value="diabetes" /> Diabetes</label><br />
                  <label><input type="checkbox" name="history" value="hypertension" /> High Blood Pressure</label>
                </div>
                <div>
                  <label><input type="checkbox" name="history" value="allergies" /> Allergies</label><br />
                  <label><input type="checkbox" name="history" value="heart_disease" /> Heart Disease</label><br />
                  <label><input type="checkbox" name="history" value="migraine" /> Migraines</label>
                </div>
              </div>
            </fieldset>
          </td>
        </tr>

        <tr>
          <td colspan="3">
            <fieldset>
              <legend>Basic Information</legend>

              <div class="inline-group">
                <div>
                  <label>Gender</label><br />
                  <label><input type="radio" name="gender" value="male" required /> Male</label><br />
                  <label><input type="radio" name="gender" value="female" /> Female</label><br />
                  <label><input type="radio" name="gender" value="other" /> Other</label>
                </div>

                <div>
                  <label>Vaccinated?</label><br />
                  <label><input type="radio" name="vaccinated" value="yes" required /> Yes</label><br />
                  <label><input type="radio" name="vaccinated" value="no" /> No</label>
                </div>

                <div>
                  <label>Do you have insurance?</label><br />
                  <label><input type="radio" name="insured" value="yes" required /> Yes</label><br />
                  <label><input type="radio" name="insured" value="no" /> No</label>
                </div>
              </div>
            </fieldset>
          </td>
        </tr>

        <tr>
          <td colspan="3">
            <label for="healthScale">On a scale of 1 to 10 (10 being the worst), how is your pain?</label>
            <input id="healthScale" name="healthScale" type="range" min="1" max="10" value="5" />
          </td>
        </tr>

        <tr>
          <td colspan="3">
            <label for="userId">Desired User ID</label>
            <input id="userId" name="userId" type="text" maxlength="20" required />
          </td>
        </tr>

        <tr>
          <td>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />
          </td>
          <td colspan="2">
            <label for="password2">Re-enter Password</label>
            <input id="password2" name="password2" type="password" required />
          </td>
        </tr>

        <tr>
          <td colspan="3">
            <div class="actions">
              <button type="save" onclick="alert('Information have been saved')">Save and Finish Later</button>
              <button type="submit" onclick="alert('Thank you for submiting your information')">Submit</button>
            </div>
          </td>
        </tr>
      </table>
    </form>
  </div>
  <!-- Footer -->
<footer>
  <div class="bottom">
    <div>
      <button type="button" onclick="alert('Phone Number: (555) 123-4567')">Contact Us</button>
    </div>
    <p class="hint">&copy; 2026 Patient's Solutions Clinic</p>
  </div>
  </footer>
</body> 
</html>
